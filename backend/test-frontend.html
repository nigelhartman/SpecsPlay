<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lyria Song Generator Test</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; background: #111; color: #eee; }
    h1 { font-size: 1.4rem; margin-bottom: 4px; }
    .status { font-size: 0.9rem; color: #60A5FA; margin-bottom: 20px; }
    .row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    input[type=text] { background: #222; color: #eee; border: 1px solid #444; border-radius: 6px; padding: 8px 12px; font-size: 0.95rem; flex: 1; min-width: 200px; }
    button { padding: 8px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.95rem; }
    #connectBtn { background: #3b82f6; color: #fff; }
    .style-btn { background: #333; color: #eee; border: 2px solid #555; transition: all 0.15s; }
    .style-btn:hover { border-color: #aaa; }
    .style-btn.active { border-color: #22c55e; color: #22c55e; }
    .style-btn:disabled { opacity: 0.4; cursor: default; }
    #dropzone { border: 2px dashed #444; border-radius: 10px; padding: 24px; text-align: center; color: #888; cursor: pointer; margin-bottom: 16px; }
    #dropzone.over { border-color: #60A5FA; color: #60A5FA; }
    #preview { max-width: 100%; max-height: 240px; border-radius: 8px; display: none; margin-bottom: 16px; }
    #log { background: #1a1a1a; border-radius: 8px; padding: 12px; font-size: 0.8rem; font-family: monospace; height: 180px; overflow-y: auto; color: #aaa; }
    #log .info { color: #60A5FA; }
    #log .ok   { color: #22c55e; }
    #log .err  { color: #ef4444; }
    #log .warn { color: #f59e0b; }
  </style>
</head>
<body>
  <h1>Lyria Song Generator Test</h1>
  <div class="status" id="statusText">Disconnected</div>

  <div class="row">
    <input type="text" id="wsUrl" placeholder="ws://localhost:3000" value="ws://localhost:3000" />
    <button id="connectBtn">Connect</button>
  </div>

  <div id="dropzone">Drop an image here or click to upload</div>
  <input type="file" id="fileInput" accept="image/*" style="display:none">
  <img id="preview" alt="Preview">

  <div class="row">
    <button class="style-btn" id="kpopBtn" disabled>K-Pop</button>
    <button class="style-btn" id="rockBtn" disabled>Rock</button>
    <button class="style-btn" id="hiphopBtn" disabled>Hip-Hop</button>
  </div>

  <div id="log"></div>

  <script>
    const wsUrlEl    = document.getElementById('wsUrl')
    const connectBtn = document.getElementById('connectBtn')
    const statusEl   = document.getElementById('statusText')
    const dropzone   = document.getElementById('dropzone')
    const fileInput  = document.getElementById('fileInput')
    const preview    = document.getElementById('preview')
    const kpopBtn    = document.getElementById('kpopBtn')
    const rockBtn    = document.getElementById('rockBtn')
    const hiphopBtn  = document.getElementById('hiphopBtn')
    const logEl      = document.getElementById('log')

    let ws = null
    let imageBase64 = null
    let audioCtx = null
    let nextPlayTime = 0
    const SAMPLE_RATE = 48000

    function log(msg, cls = '') {
      const line = document.createElement('div')
      if (cls) line.className = cls
      line.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg
      logEl.appendChild(line)
      logEl.scrollTop = logEl.scrollHeight
    }

    function setStatus(msg, cls = '') {
      statusEl.textContent = msg
      statusEl.style.color = cls === 'ok' ? '#22c55e' : cls === 'err' ? '#ef4444' : '#60A5FA'
    }

    function setStyleBtnsEnabled(enabled) {
      ;[kpopBtn, rockBtn, hiphopBtn].forEach(b => b.disabled = !enabled)
    }

    // ── Image handling ───────────────────────────────────────────────────────

    function loadImage(file) {
      const reader = new FileReader()
      reader.onload = e => {
        const img = new Image()
        img.onload = () => {
          const MAX = 800
          const scale = Math.min(1, MAX / Math.max(img.width, img.height))
          const canvas = document.createElement('canvas')
          canvas.width  = Math.round(img.width  * scale)
          canvas.height = Math.round(img.height * scale)
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height)
          const dataUrl = canvas.toDataURL('image/jpeg', 0.8)
          imageBase64 = dataUrl.split(',')[1]
          preview.src = dataUrl
          preview.style.display = 'block'
          const kb = Math.round(imageBase64.length * 0.75 / 1024)
          log('Image loaded: ' + canvas.width + 'x' + canvas.height + ' (' + kb + 'KB)', 'ok')
        }
        img.src = e.target.result
      }
      reader.readAsDataURL(file)
    }

    dropzone.onclick = () => fileInput.click()
    fileInput.onchange = e => loadImage(e.target.files[0])
    dropzone.ondragover = e => { e.preventDefault(); dropzone.classList.add('over') }
    dropzone.ondragleave = () => dropzone.classList.remove('over')
    dropzone.ondrop = e => { e.preventDefault(); dropzone.classList.remove('over'); loadImage(e.dataTransfer.files[0]) }

    // ── WebSocket ────────────────────────────────────────────────────────────

    connectBtn.onclick = () => {
      if (ws) { ws.close(); return }
      const url = wsUrlEl.value.trim()
      setStatus('Connecting...')
      log('Connecting to ' + url)
      ws = new WebSocket(url)
      ws.binaryType = 'arraybuffer'

      ws.onopen = () => {
        log('Connected', 'ok')
        setStatus('Ready — pick a style', 'ok')
        connectBtn.textContent = 'Disconnect'
        setStyleBtnsEnabled(true)
      }

      ws.onmessage = e => {
        if (e.data instanceof ArrayBuffer) {
          const bytes = new Uint8Array(e.data)
          log('Audio chunk: ' + bytes.length + ' bytes', 'ok')
          playPCM16(bytes)
        } else {
          try {
            const msg = JSON.parse(e.data)
            if (msg.type === 'status') {
              log('[status] ' + msg.state + (msg.message ? ': ' + msg.message : ''),
                msg.state === 'error' ? 'err' : msg.state === 'done' ? 'ok' : 'info')
              if (msg.state === 'done') setStatus('Playing', 'ok')
              else if (msg.state === 'generating') setStatus('Generating...')
              else if (msg.state === 'error') { setStatus('Error: ' + (msg.message ?? ''), 'err'); setStyleBtnsEnabled(true) }
            }
          } catch (_) {}
        }
      }

      ws.onclose = () => {
        log('Disconnected')
        setStatus('Disconnected')
        connectBtn.textContent = 'Connect'
        setStyleBtnsEnabled(false)
        ws = null
      }

      ws.onerror = () => {
        log('WebSocket error', 'err')
        setStatus('Connection error', 'err')
      }
    }

    // ── Style buttons ────────────────────────────────────────────────────────

    function generate(style, btn) {
      if (!ws || ws.readyState !== WebSocket.OPEN) return
      if (!imageBase64) { log('Load an image first', 'err'); return }

      ;[kpopBtn, rockBtn, hiphopBtn].forEach(b => b.classList.remove('active'))
      btn.classList.add('active')
      setStyleBtnsEnabled(false)
      nextPlayTime = 0  // reset audio queue for new song

      log('Requesting ' + style + ' song...')
      ws.send(JSON.stringify({ type: 'generate', imageBase64, style }))
    }

    kpopBtn.onclick   = () => generate('kpop',   kpopBtn)
    rockBtn.onclick   = () => generate('rock',   rockBtn)
    hiphopBtn.onclick = () => generate('hiphop', hiphopBtn)

    // ── Audio ────────────────────────────────────────────────────────────────

    function ensureAudioCtx() {
      if (!audioCtx) {
        audioCtx = new AudioContext({ sampleRate: SAMPLE_RATE })
        nextPlayTime = audioCtx.currentTime
      }
      if (audioCtx.state === 'suspended') audioCtx.resume()
    }

    function playPCM16(uint8) {
      ensureAudioCtx()
      const samples = uint8.length / 4  // stereo PCM16 = 4 bytes/frame
      const buffer  = audioCtx.createBuffer(2, samples, SAMPLE_RATE)
      const left    = buffer.getChannelData(0)
      const right   = buffer.getChannelData(1)
      for (let i = 0; i < samples; i++) {
        const lo = uint8[i * 4],     hi = uint8[i * 4 + 1]
        const lo2 = uint8[i * 4 + 2], hi2 = uint8[i * 4 + 3]
        left[i]  = (((hi  << 8) | lo)  << 16 >> 16) / 32768
        right[i] = (((hi2 << 8) | lo2) << 16 >> 16) / 32768
      }
      const src = audioCtx.createBufferSource()
      src.buffer = buffer
      src.connect(audioCtx.destination)
      const when = Math.max(nextPlayTime, audioCtx.currentTime + 0.05)
      src.start(when)
      nextPlayTime = when + buffer.duration
      if (nextPlayTime > audioCtx.currentTime + 1) setStyleBtnsEnabled(true)
    }
  </script>
</body>
</html>
